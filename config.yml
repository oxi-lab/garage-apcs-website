backend:
  name: git-gateway
  branch: main

# ── Medias (galerie) ──────────────────────────────────
media_folder: "images/galerie"
public_folder: "/images/galerie"

# ── Config locale (optionnel : pour tester sans compte) ──
# local_backend: true

locale: fr

# ════════════════════════════════════════════════════
#  COLLECTIONS
# ════════════════════════════════════════════════════
collections:

  # ── 1. Infos générales du garage ──────────────────
  - name: "general"
    label: "⚙️ Infos du garage"
    files:
      - name: "config"
        label: "Informations & Textes"
        file: "_data/general.json"
        fields:
          - { label: "Nom du garage",   name: "name",     widget: "string", default: "Garage A.P.C.S" }
          - { label: "Sous-titre",      name: "subtitle",  widget: "string", default: "Auto-Moto" }
          - label: "Texte d'accueil (Hero)"
            name: "welcome"
            widget: "text"
            hint: "Paragraphe affiché sous le titre principal sur la page d'accueil."
          - { label: "Téléphone (affiché)",   name: "phone",    widget: "string", default: "07 61 13 72 52" }
          - { label: "Téléphone (lien tel:)", name: "phoneRaw", widget: "string", default: "+33761137252", hint: "Format international sans espaces, ex: +33761137252" }
          - { label: "Adresse complète",       name: "address",  widget: "string" }
          - label: "Mentions légales (footer)"
            name: "legal"
            widget: "string"
            hint: "Ex : © 2025 Garage A.P.C.S — Auto-entrepreneur — SIRET : 000 000 000 00000"

  # ── 2. Horaires ────────────────────────────────────
  - name: "horaires"
    label: "🕐 Horaires d'ouverture"
    files:
      - name: "hours"
        label: "Planning hebdomadaire"
        file: "_data/hours.json"
        fields:
          - name: "hours"
            label: "Jours"
            widget: "list"
            summary: "{{fields.day}}"
            fields:
              - { label: "Jour",          name: "day",  widget: "string" }
              - { label: "Matin (ex: 09h00 – 12h00)",  name: "am",   widget: "string", required: false }
              - { label: "Après-midi (ex: 13h30 – 18h00)", name: "pm", widget: "string", required: false }
              - { label: "Ouvert ?",      name: "open", widget: "boolean", default: true }

  # ── 3. Services ────────────────────────────────────
  - name: "services"
    label: "🔧 Services proposés"
    files:
      - name: "services"
        label: "Liste des services"
        file: "_data/services.json"
        fields:
          - name: "services"
            label: "Services"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Icône FontAwesome"
                name: "icon"
                widget: "string"
                hint: "Classe FontAwesome, ex: fas fa-wrench (voir fontawesome.com/icons)"
              - { label: "Titre du service", name: "title", widget: "string" }
              - { label: "Description",      name: "desc",  widget: "text" }

  # ── 4. Galerie photos ──────────────────────────────
  - name: "galerie"
    label: "📷 Galerie photos"
    files:
      - name: "gallery"
        label: "Photos de la galerie"
        file: "_data/gallery.json"
        fields:
          - name: "gallery"
            label: "Photos"
            widget: "list"
            summary: "{{fields.alt}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                hint: "Téléversez une photo (JPG/PNG recommandé, largeur min. 800px)"
              - label: "Légende / texte alternatif"
                name: "alt"
                widget: "string"
                hint: "Décrit la photo, affiché au survol"
              - label: "Grande carte (2×2) ?"
                name: "featured"
                widget: "boolean"
                default: false
                hint: "Active une carte élargie pour la photo principale"
